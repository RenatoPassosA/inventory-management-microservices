spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5435/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

services:
  price-service:
    url: http://localhost:8080
  inventory-service:
    url: http://localhost:8083

server:
  port: 8082