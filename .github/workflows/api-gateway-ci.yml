name: API Gateway CI

on:
  push:
    paths:
      - 'api-gateway/**'
      - '.github/workflows/api-gateway-ci.yml'
  pull_request:
    paths:
      - 'api-gateway/**'
      - '.github/workflows/api-gateway-ci.yml'

jobs:
  api-gateway-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Run API Gateway tests
        run: ./mvnw clean test